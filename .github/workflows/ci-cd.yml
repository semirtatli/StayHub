name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/stayhub

jobs:
  # ── Backend Build & Test ───────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore StayHub.slnx

      - name: Build
        run: dotnet build StayHub.slnx --no-restore -c Release

      - name: Run unit tests
        run: dotnet test StayHub.slnx --no-build -c Release --filter "UnitTests" --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ./TestResults/*.trx

  # ── Frontend Build & Test ──────────────────────────────────────────
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend/stayhub-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/Frontend/stayhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  # ── Docker Build & Push ────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: identity-api, dockerfile: src/Services/Identity/Dockerfile }
          - { name: hotel-api, dockerfile: src/Services/Hotel/Dockerfile }
          - { name: booking-api, dockerfile: src/Services/Booking/Dockerfile }
          - { name: payment-api, dockerfile: src/Services/Payment/Dockerfile }
          - { name: review-api, dockerfile: src/Services/Review/Dockerfile }
          - { name: notification-api, dockerfile: src/Services/Notification/Dockerfile }
          - { name: analytics-api, dockerfile: src/Services/Analytics/Dockerfile }
          - { name: api-gateway, dockerfile: src/ApiGateway/Dockerfile }
          - { name: frontend, dockerfile: src/Frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
