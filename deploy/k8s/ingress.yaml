apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stayhub-ingress
  namespace: stayhub
  labels:
    app.kubernetes.io/name: stayhub-ingress
    app.kubernetes.io/part-of: stayhub
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stayhub.dev
      secretName: stayhub-tls
  rules:
    - host: stayhub.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
