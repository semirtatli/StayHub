apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-api
  namespace: stayhub
  labels:
    app: hotel-api
    app.kubernetes.io/name: hotel-api
    app.kubernetes.io/part-of: stayhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-api
  template:
    metadata:
      labels:
        app: hotel-api
        app.kubernetes.io/name: hotel-api
        app.kubernetes.io/part-of: stayhub
    spec:
      containers:
        - name: hotel-api
          image: stayhub/hotel-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: stayhub-config
            - secretRef:
                name: stayhub-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-api
  namespace: stayhub
  labels:
    app: hotel-api
    app.kubernetes.io/name: hotel-api
    app.kubernetes.io/part-of: stayhub
spec:
  type: ClusterIP
  selector:
    app: hotel-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
