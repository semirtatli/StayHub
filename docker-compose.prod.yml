# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  sqlserver:
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-gateway:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: always
