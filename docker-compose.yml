# Docker Compose for local development
# Starts all StayHub microservices + infrastructure
services:
  # ── Infrastructure ─────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StayHub@Dev2026!
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StayHub@Dev2026!" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=stayhub
      - RABBITMQ_DEFAULT_PASS=stayhub
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API Gateway ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      identity-api:
        condition: service_started
      hotel-api:
        condition: service_started
      booking-api:
        condition: service_started

  # ── Microservices ──────────────────────────────────────────────────
  identity-api:
    build:
      context: .
      dockerfile: src/Services/Identity/Dockerfile
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__IdentityDb=Server=sqlserver;Database=StayHub_Identity;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  hotel-api:
    build:
      context: .
      dockerfile: src/Services/Hotel/Dockerfile
    ports:
      - "5102:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__HotelDb=Server=sqlserver;Database=StayHub_Hotel;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  booking-api:
    build:
      context: .
      dockerfile: src/Services/Booking/Dockerfile
    ports:
      - "5104:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__BookingDb=Server=sqlserver;Database=StayHub_Booking;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/Dockerfile
    ports:
      - "5106:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PaymentDb=Server=sqlserver;Database=StayHub_Payment;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  review-api:
    build:
      context: .
      dockerfile: src/Services/Review/Dockerfile
    ports:
      - "5108:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ReviewDb=Server=sqlserver;Database=StayHub_Review;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  notification-api:
    build:
      context: .
      dockerfile: src/Services/Notification/Dockerfile
    ports:
      - "5110:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__NotificationDb=Server=sqlserver;Database=StayHub_Notification;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analytics-api:
    build:
      context: .
      dockerfile: src/Services/Analytics/Dockerfile
    ports:
      - "5112:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AnalyticsDb=Server=sqlserver;Database=StayHub_Analytics;User Id=sa;Password=StayHub@Dev2026!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: src/Frontend/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

volumes:
  sqlserver_data:
  rabbitmq_data:
